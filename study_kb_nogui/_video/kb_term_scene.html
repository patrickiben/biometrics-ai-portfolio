<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>Study KB — terminal screencast</title>
<style>
:root{--dark:#15183A;--muted:#5A607E;--ice:#D5DAF5;--term:#12152E;--indigo:#4338CA;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:var(--dark)}
body{font-family:Calibri,"Segoe UI",Helvetica,Arial,sans-serif;color:#fff}
#stage{position:relative;width:1920px;height:1080px;background:radial-gradient(ellipse 90% 70% at 50% 18%,#1b1f47 0%,#15183A 70%)}
#hdr{position:absolute;left:72px;top:40px;right:72px}
#hdr .bar{position:absolute;left:0;top:8px;width:8px;height:52px;background:#3A6FB0;border-radius:4px}
#hdr .eyebrow{margin-left:26px;font-size:17px;font-weight:700;letter-spacing:3px;color:#aeb4e0;text-transform:uppercase}
#hdr h1{margin-left:26px;font-family:Georgia,"Times New Roman",serif;font-size:33px;font-weight:700;color:#fff;margin-top:7px;line-height:1.1}
/* terminal window */
#term{position:absolute;left:72px;top:158px;width:1776px;height:792px;background:#012456;
  border-radius:9px;overflow:hidden;box-shadow:0 30px 80px #00000060;border:1px solid #0a3a7a}
#term .tbar{height:44px;background:#2d2d2d;display:flex;align-items:center;gap:11px;padding:0 0 0 16px;font-size:15px;color:#e6e6e6}
#term .tbar .picon{font-family:Consolas,monospace;font-weight:700;color:#16c60c}
#term .tbar .ttitle{font-weight:600;color:#e9e9e9}
#term .tbar .wctl{margin-left:auto;display:flex;height:44px}
#term .tbar .wctl i{width:48px;height:44px;display:flex;align-items:center;justify-content:center;font-style:normal;color:#d6d6d6;font-size:14px}
#term .tbar .wctl .min::before{content:"\2013"}
#term .tbar .wctl .max::before{content:"\25A1";font-size:15px}
#termview{position:absolute;top:44px;left:0;right:0;bottom:0;overflow:hidden}
#termbody{position:absolute;left:0;top:0;right:0;padding:20px 28px;
  font-family:Consolas,"Cascadia Mono","SF Mono",Menlo,monospace;font-size:20px;line-height:1.5;color:#eeedf0}
.cmd{white-space:pre-wrap;margin-top:6px}
.cmd .p{color:#e8e8ee;font-weight:400}.cmd .c{color:#fff;font-weight:700}
.cur{color:#d6d9e6}
.out{white-space:pre-wrap;color:#d6dbec}
.out .ok{color:#16c60c;font-weight:700}.out .add{color:#84ffb0}.out .skip{color:#f9f1a5}
.out .warn{color:#f9f1a5}.out .bad{color:#ff9d8a}.out .com{color:#b0b6e0;font-style:italic}.out .dim{color:#aab3d6}
</style></head>
<body><div id="stage">
  <div id="hdr"><div class="bar"></div><div class="eyebrow" id="seye">STUDY KNOWLEDGE BASE · NO GUI · OPERATIONS ONLY</div><h1 id="stitle">The real script</h1></div>
  <div id="term">
    <div class="tbar"><span class="picon">&gt;_</span><span class="ttitle">Windows PowerShell</span><span class="wctl"><i class="min"></i><i class="max"></i><i class="cls">&#10005;</i></span></div>
    <div id="termview"><div id="termbody"></div></div>
  </div>
</div>
<script>
const CAST = [
 {
  "label": "ls",
  "cmd": "Get-ChildItem -Name *.ps1, *.vba",
  "out": "kb_ingest_demo.ps1\nUpdate-StudyKB.ps1\nFileToKB.vba"
 },
 {
  "label": "whatitdoes",
  "cmd": "Get-Content Update-StudyKB.ps1 | Select-Object -Skip 5 -First 7",
  "out": "  WHAT IT DOES (the automated path \u2014 the default)\n    Scheduled every few minutes, it ATTACHES to your already-open classic\n    Outlook, reads the study mail folder(s) you point it at, and files EVERY new\n    message as one searchable HTML note \u2014 then rebuilds index.html. You do not\n    drag anything. It is incremental and idempotent: each message is filed once\n    (tracked by Outlook EntryID in .state\\seen.json) and your email is NEVER\n    moved, deleted, or modified \u2014 it only reads."
 },
 {
  "label": "attach",
  "cmd": "Get-Content Update-StudyKB.ps1 | Select-Object -Skip 117 -First 5",
  "out": "# attach to the RUNNING classic Outlook only (never launch one under a scheduler)\nfunction Get-RunningOutlook {\n  try { return [System.Runtime.InteropServices.Marshal]::GetActiveObject('Outlook.Application') }\n  catch { return $null }\n}"
 },
 {
  "label": "sanitize_code",
  "cmd": "Get-Content Update-StudyKB.ps1 | Select-Object -Skip 86 -First 10",
  "out": "function Sanitize-Html([string]$h){\n  if (-not $h){ return $h }\n  $h = $h -replace '(?is)<script.*?<\/script>',''\n  $h = $h -replace '(?is)<style.*?<\/style>',''\n  $h = $h -replace '(?is)<(iframe|object|embed).*?<\/\\1>',''\n  $h = $h -replace '(?i)<(script|style|iframe|object|embed|link|meta|base)\\b[^>]*>',''\n  $h = $h -replace '(?i)\\son\\w+\\s*=\\s*(\"[^\"]*\"|''[^'']*''|[^\\s>]+)',''   # on*= event handlers\n  $h = $h -replace '(?i)(src|background)\\s*=\\s*(\"|'')\\s*https?:','$1=$2blocked-remote:'  # stop remote fetches\n  $h = $h -replace '(?i)javascript:','blocked:'\n  return $h"
 },
 {
  "label": "inbox",
  "cmd": "New-Item -ItemType Directory -Force _Inbox | Out-Null; Get-ChildItem -Name",
  "out": "_Inbox\nFileToKB.vba\nkb_ingest_demo.ps1\nUpdate-StudyKB.ps1"
 },
 {
  "label": "drop",
  "cmd": "Copy-Item ..\\samples\\*.html .\\_Inbox\\; Get-ChildItem -Name .\\_Inbox\\",
  "out": "dta03.html\nkick.html\nmv2.html"
 },
 {
  "label": "ingest",
  "cmd": ".\\kb_ingest_demo.ps1",
  "out": "    + Notes\\20260622_091400__CP-101_-_Data_transfer_DTA-03_received__640e411e.html\n        EntryID 000000042AEA289417...  read-only  sanitized\n    + Notes\\20260622_091400__CP-101_-_Kickoff_meeting_minutes__38e4fe64.html\n        EntryID 0000000641F95106EE...  read-only  sanitized\n    + Notes\\20260622_091400__CP-101_-_Monitoring_visit_MV-2_report_filed__65156773.html\n        EntryID 0000000FA02CB9E948...  read-only  sanitized\n[StudyKB] done - 3 filed, 0 skipped - seen-set now 3 - operations-only"
 },
 {
  "label": "notes",
  "cmd": "Get-ChildItem -Name .\\Notes\\; Write-Host '--- .state\\seen.json (the EntryID watermark) ---'; Get-Content .\\.state\\seen.json",
  "out": "20260622_091400__CP-101_-_Data_transfer_DTA-03_received__640e411e.html\n20260622_091400__CP-101_-_Kickoff_meeting_minutes__38e4fe64.html\n20260622_091400__CP-101_-_Monitoring_visit_MV-2_report_filed__65156773.html\n--- .state\\seen.json (the EntryID watermark) ---\n[\n  \"000000042AEA2894171AF70D0E32FD883CAD230\",\n  \"0000000641F95106EE2726FC973F20A129036C8\",\n  \"0000000FA02CB9E948BEE0D5E30F49E8DBC54B6\"\n]"
 },
 {
  "label": "entry",
  "cmd": "Get-Content \".\\Notes\\20260622_091400__CP-101_-_Data_transfer_DTA-03_received__640e411e.html\" -TotalCount 7",
  "out": "<!doctype html><meta charset=\"utf-8\"><title>CP-101 - Data transfer DTA-03 received<\/title>\n<body style=\"font-family:Segoe UI,Arial,sans-serif;max-width:820px;margin:24px auto;padding:0 16px\">\n<h2>CP-101 - Data transfer DTA-03 received<\/h2>\n<p style=\"color:#555\"><b>From:<\/b> Data Management &nbsp;|&nbsp; <b>Captured:<\/b> 2026-06-22 09:14<\/p><hr>\n<!doctype html><title>CP-101 - Data transfer DTA-03 received<\/title>"
 },
 {
  "label": "proof_src",
  "cmd": "Write-Host 'the source email carried:'; '  <script> present : ' + [bool]((Get-Content -Raw .\\_Inbox\\_processed\\dta03.html) -match '<script'); '  remote pixel    : ' + [regex]::Match((Get-Content -Raw .\\_Inbox\\_processed\\dta03.html),'https://tracker[^\"]+').Value",
  "out": "the source email carried:\n  <script> present : True\n  remote pixel    : https://tracker.example.com/pixel.gif?u=open"
 },
 {
  "label": "proof_note",
  "cmd": "Write-Host 'the filed note carries:'; '  <script> present : ' + [bool]((Get-Content -Raw \".\\Notes\\20260622_091400__CP-101_-_Data_transfer_DTA-03_received__640e411e.html\") -match '<script'); '  remote pixel    : ' + [regex]::Match((Get-Content -Raw \".\\Notes\\20260622_091400__CP-101_-_Data_transfer_DTA-03_received__640e411e.html\"),'blocked-remote://tracker[^\"]+').Value",
  "out": "the filed note carries:\n  <script> present : False\n  remote pixel    : blocked-remote://tracker.example.com/pixel.gif?u=open"
 },
 {
  "label": "rerun",
  "cmd": "Copy-Item ..\\samples\\*.html .\\_Inbox\\; .\\kb_ingest_demo.ps1",
  "out": "    . skip (already filed): dta03.html\n    . skip (already filed): kick.html\n    . skip (already filed): mv2.html\n[StudyKB] done - 0 filed, 3 skipped - seen-set now 3 - operations-only"
 },
 {
  "label": "vba",
  "cmd": "Get-Content FileToKB.vba | Select-Object -Skip 3 -First 13",
  "out": "' This is the AD-HOC one-click for the rare email that lives outside your study\n' folder. The routine path is automatic: Update-StudyKB.ps1 reads the study\n' folder on a schedule (-StudyFolders) \u2014 you don't click anything. Use this only\n' to capture a stray forwarded thread into the KB inbox in one click.\n'\n' Outlook Quick Steps can only move mail to ANOTHER OUTLOOK FOLDER, not to a\n' disk folder \u2014 so a true one-click-to-disk uses this tiny VBA button instead.\n' (CLASSIC Outlook only; the \"new\" Outlook has no VBA \u2014 there, drag/Save-As the\n'  email as .eml into the synced _Inbox and let the scheduled script file it.)\n'\n' SETUP (once):\n'   1. Outlook \u25b8 Alt+F11 (VBA editor) \u25b8 Project1 \u25b8 right-click \u25b8 Insert \u25b8 Module\n'      \u25b8 paste everything below. Set INBOX to your synced library's _Inbox path."
 }
];
const byLabel = {}; CAST.forEach(s => byLabel[s.label] = s);
const SCENES = [
  { eye:'THE REAL THING · NO GUI', title:'The actual script — it only reads your mail', steps:['ls','whatitdoes','attach','sanitize_code'] },
  { eye:'A FOLDER ON A LOCAL DRIVE', title:'The folder, and the ad-hoc capture you already have', steps:['inbox','drop'] },
  { eye:'RUN IT', title:'Every email becomes one read-only, structured note', steps:['ingest','notes'] },
  { eye:'A FILED NOTE · THE SAFETY NET', title:'Sanitized on the way in — no scripts, no remote beacons', steps:['entry','proof_src','proof_note'] },
  { eye:'IDEMPOTENT BY DESIGN', title:'The EntryID watermark means it never files anything twice', steps:['rerun'] },
  { eye:'THE AD-HOC ONE-CLICK', title:'A small Outlook macro for the stray email', steps:['vba'] },
];
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const $=s=>document.querySelector(s);
const termview=$('#termview'), termbody=$('#termbody');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function colorize(line){
  let h=esc(line);
  if(/^\s*\+\s/.test(line)) return '<span class="add">'+h+'</span>';
  if(/skip \(already filed\)/.test(line)) return '<span class="skip">'+h+'</span>';
  if(/^\[StudyKB\]/.test(line)) return '<span class="ok">'+h+'</span>';
  if(/blocked-remote/.test(line)) return h.replace(/(blocked-remote:\/\/[^\s]*)/,'<span class="warn">$1</span>');
  if(/&lt;script/.test(h)) return '<span class="bad">'+h+'</span>';
  if(/^\s*#|^\s*'|WHAT IT DOES|tracked by Outlook|the source email|the filed note|script stripped/.test(line)) return '<span class="com">'+h+'</span>';
  if(/^---|seen\.json|entryid|read-only|sanitized/.test(line)) return '<span class="dim">'+h+'</span>';
  return h;
}
const PROMPT='<span class="p">PS C:\\Users\\biostat\\Study Knowledge Base&gt;</span> ';
function renderStep(label,lp){
  const st=byLabel[label]; if(!st) return '';
  const typed = lp<0.32 ? st.cmd.slice(0,Math.ceil((lp/0.32)*st.cmd.length)) : st.cmd;
  let html='<div class="cmd">'+PROMPT+'<span class="c">'+esc(typed)+'</span>'+(lp<0.32?'<span class="cur">▏</span>':'')+'</div>';
  if(lp>=0.32 && st.out){
    const lines=st.out.split('\n');
    const op=(lp-0.32)/0.6;
    const show=clamp(Math.round(op*lines.length),0,lines.length);
    html+='<div class="out">'+lines.slice(0,show).map(colorize).join('\n')+'</div>';
  }
  return html;
}
window.seek=function(scene,t){
  const sc=SCENES[scene]||SCENES[SCENES.length-1];
  $('#seye').textContent=sc.eye; $('#stitle').textContent=sc.title;
  const K=sc.steps.length; let html='';
  for(let i=0;i<K;i++){ const lp=clamp((t-i/K)*K,0,1); if(lp>0) html+=renderStep(sc.steps[i],lp); }
  termbody.innerHTML=html;
  // auto-scroll to the bottom of the output
  const ch=termview.clientHeight, bh=termbody.scrollHeight;
  termbody.style.transform='translateY('+Math.min(0,ch-bh-20)+'px)';
};
window.seek(0,0);
</script>
</body></html>
